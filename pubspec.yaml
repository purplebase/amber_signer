name: amber_signer
description: Amber signer for models (vendored native plugin with cancellable, reply-safe activity results)
version: 0.3.0

environment:
  sdk: ">=3.8.0 <4.0.0"
  flutter: ">=1.17.0"

dependencies:
  flutter:
    sdk: flutter
  models: ^0.3.3
  riverpod: ^2.6.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

dependency_overrides:
  models:
    # path: ../models
    git:
      url: https://github.com/purplebase/models
      ref: eb79db4c06c3b43e6ca64848e1228702d99ac3ce

flutter:
  plugin:
    platforms:
      android:
        package: dev.purplebase.amber_signer
        pluginClass: AmberSignerPlugin
